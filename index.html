<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamEndRoblox | Free Serverside Executor</title>
    <style>
        :root {
            --glow-color: #00ff66;
            --bg-color: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.6);
            --text-color: #ffffff;
            --text-muted: #8a8a93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* matrix style neon grid background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            top: -50%;
            left: -50%;
            transform: rotate(15deg);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.05);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        h1 span {
            color: var(--glow-color);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .code-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 15px;
            text-align: left;
            position: relative;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .code-box pre {
            color: #00ffaa;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .btn {
            background: transparent;
            color: var(--glow-color);
            border: 1px solid var(--glow-color);
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .btn:hover {
            background: var(--glow-color);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
        }

        .status {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status span {
            color: var(--glow-color);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TeamEnd <span>SS</span></h1>
        <p class="subtitle">the ultimate free roblox serverside executor</p>

        <div class="code-box">
            <!-- replace the URL below with your actual raw script loadstring URL -->
            <pre id="scriptStr">require(1234567890)("TeamEnd")</pre>
        </div>

        <button class="btn" onclick="copyScript()">Copy Script</button>

        <div class="status">
            Status: <span>ONLINE & UNDETECTED</span>
        </div>
    </div>

    <script>
        function copyScript() {
            const scriptText = document.getElementById('scriptStr').innerText;
            navigator.clipboard.writeText(scriptText).then(() => {
                const btn = document.querySelector('.btn');
                btn.innerText = 'Copied!';
                btn.style.color = '#000';
                btn.style.backgroundColor = '#00ff66';
                
                setTimeout(() => {
                    btn.innerText = 'Copy Script';
                    btn.style.color = '#00ff66';
                    btn.style.backgroundColor = 'transparent';
                }, 2000);
            }).catch(err => {
                console.error('failed to copy: ', err);
            });
        }
    </script>

</body>
</html>
